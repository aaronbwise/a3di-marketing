<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A3DI OG Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #888;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      width: 1200px;
      height: 627px;
      background: #0d1d3f;
      font-family: 'Montserrat', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Subtle accent bar at top */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: #3075ff;
    }

    /* Decorative corner element — echoes the icon's square motif */
    .card::after {
      content: '';
      position: absolute;
      bottom: -40px;
      right: -40px;
      width: 160px;
      height: 160px;
      border: 3px solid rgba(48, 117, 255, 0.15);
    }

    .logo {
      width: 360px;
      margin-bottom: 36px;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: #3075ff;
      margin-bottom: 32px;
    }

    .tagline {
      color: #ffffff;
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 0.5px;
      text-align: center;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.5);
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 20px;
    }

    .url {
      position: absolute;
      bottom: 28px;
      color: rgba(255, 255, 255, 0.35);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="../../branding/Fiverr/A3DI/Logo-02.png" alt="A3DI" />
    <div class="divider"></div>
    <div class="tagline">Better results through data</div>
    <div class="subtitle">Data &amp; Evidence Consulting</div>
    <div class="url">www.a3di.dev</div>
  </div>
</body>
</html>
